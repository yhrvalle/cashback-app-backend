services:
  db:
    image: postgres:17  
    container_name: postgres-mint
    restart: always
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 

  api:
    build: .
    container_name: python-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: $DATABASE_URL
    volumes:
      - .:/app 

volumes:
  postgres_data: